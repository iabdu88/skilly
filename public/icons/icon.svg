<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Skilly">
  <defs>
    <linearGradient id="sg-icon" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00E5CC"/>
    </linearGradient>
  </defs>

  <!-- Dark violet background -->
  <rect width="512" height="512" rx="96" fill="#0F0A1E"/>

  <!-- Play-button triangle centred in the icon, rounded corners -->
  <path d="M46 96 L46 416 Q46 466 96 466 L418 278 Q466 256 418 234 L96 46 Q46 46 46 96 Z"
    fill="url(#sg-icon)"/>

  <!-- Person silhouette in dark navy on top of the gradient -->
  <!-- Head -->
  <circle cx="200" cy="165" r="38" fill="#0A1628"/>
  <!-- Shoulders / suit body -->
  <path d="M130 230 C130 215 158 205 200 205 C242 205 270 215 270 230 L285 335 L115 335 Z" fill="#0A1628"/>
  <!-- Collar V — rendered first so the tie knot sits on top -->
  <path d="M168 212 L200 248 L232 212" fill="none" stroke="#0F0A1E" stroke-width="14" stroke-linejoin="round"/>
  <!-- Necktie — 48px knot, 32px blade, gradient fill for high contrast at 192×192
       At 192×192 this renders ≈18px wide (knot) / ≈12px (blade): clearly visible -->
  <path d="M176 248 L224 248 L216 284 L216 330 L200 348 L184 330 L184 284 Z"
    fill="url(#sg-icon)"/>
</svg>
