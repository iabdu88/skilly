<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"
  role="img" aria-label="Skilly" fill="none">
  <defs>
    <linearGradient id="sg-icon" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00E5CC"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="96" fill="#FFFFFF"/>

  <!-- Play-button triangle with rounded corners -->
  <path d="M46 96 L46 416 Q46 466 96 466 L418 278 Q466 256 418 234 L96 46 Q46 46 46 96 Z"
    fill="url(#sg-icon)"/>

  <!-- ── Female figure (behind male) ── -->
  <!-- Head + shoulder-length hair as one silhouette -->
  <path d="M213 220
           C213 172 287 172 287 220
           C298 236 303 260 294 283
           C285 296 268 304 250 304
           C232 304 215 296 206 283
           C197 260 202 236 213 220 Z"
    fill="#0A1628"/>
  <!-- Body -->
  <path d="M207 256 C207 240 225 232 250 232 C275 232 293 240 293 256 L300 370 L200 370 Z"
    fill="#0A1628"/>

  <!-- ── Male figure (in front) ── -->
  <!-- Head -->
  <circle cx="175" cy="185" r="38" fill="#0A1628"/>
  <!-- Suit body -->
  <path d="M108 228 C108 210 136 200 175 200 C214 200 242 210 242 228 L252 370 L98 370 Z"
    fill="#0A1628"/>
  <!-- Collar V — white shirt under dark suit -->
  <path d="M148 215 L175 255 L202 215"
    fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linejoin="round"/>
  <!-- Necktie — 60px knot / 46px blade for clear visibility at 192x192
       At 192px: knot ~22px wide, blade ~17px wide, height ~43px -->
  <path d="M145 255 L205 255 L198 306 L198 358 L175 370 L152 358 L152 306 Z"
    fill="url(#sg-icon)"/>
</svg>
